# One-command local run of the synthetic covenant-model demo.
#
#   docker compose up --build
#   → open http://localhost:3000/dashboard
#
# Synthetic data only. The named volume keeps the SQLite database across
# restarts; delete it (docker compose down -v) to reset to a clean demo.
services:
  demo:
    build:
      context: .
      dockerfile: Dockerfile
    image: covenant-demo:local
    ports:
      - "3000:3000"
    environment:
      # All values have in-image demo defaults; override here if needed.
      PORT: "3000"
      AGREEMENT_ENGINE_PORT: "8765"
      AGREEMENT_DATA_BACKEND: "sqlite"
      AGREEMENT_SQLITE_PATH: "/app/apps/web/.data/agreement-intelligence.db"
      AGREEMENT_ALLOW_SYNTHETIC_SEED: "true"
      AGREEMENT_SYNTHETIC_MANIFEST: "/app/workspaces/demo/manifest.json"
      AGREEMENT_ENGINE_API_URL: "http://127.0.0.1:8765"
    volumes:
      - demo-data:/app/apps/web/.data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8765/health >/dev/null && curl -fsS http://127.0.0.1:3000/dashboard >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 40s
      retries: 3
    restart: unless-stopped

volumes:
  demo-data:
