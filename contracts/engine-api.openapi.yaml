openapi: 3.1.0
info:
  title: Agreement Intelligence Engine API
  version: 1.3.0
  description: >-
    Narrow local contract around the deterministic Python engine. The engine
    retrieves and assembles source-backed answers; legal interpretation and
    commercial judgment remain human responsibilities.
servers:
  - url: http://127.0.0.1:8765
paths:
  /health:
    get:
      operationId: engineHealth
      responses:
        "200":
          description: Engine adapter is available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
  /v1/workspaces/{workspaceId}/answers:
    post:
      operationId: answerAgreementQuestion
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            pattern: "^[a-z][a-z0-9-]{1,39}$"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnswerRequest"
      responses:
        "200":
          description: Structured answer or explicit abstention.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Answer"
        "400":
          description: Invalid input.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "404":
          description: Workspace not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
  /v1/workspaces/{workspaceId}/position:
    get:
      operationId: resolveContractPosition
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            pattern: "^[a-z][a-z0-9-]{1,39}$"
        - name: as_of
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Date-resolved contractual facts or explicit missing support.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContractPosition"
        "400":
          description: Invalid date or query.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "404":
          description: Workspace not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
  /v1/workspaces/{workspaceId}/models/ltv-calculations:
    post:
      operationId: calculateLoanToValue
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            pattern: "^[a-z][a-z0-9-]{1,39}$"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LtvCalculationRequest"
      responses:
        "200":
          description: >-
            Source-grounded deterministic calculation or an explicit
            missing-information abstention. This is not a legal conclusion.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LtvCalculation"
        "400":
          description: Invalid model or scenario identifier.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "404":
          description: Workspace not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
  /v1/workspaces/{workspaceId}/models/ltv-calculations/verification-workbook:
    post:
      operationId: generateVerificationWorkbook
      description: >-
        Generates a macro-free Excel verification workbook from an
        already-calculated LTV result. The submitted payload is re-verified
        against the live corpus (citations, threshold resolution, and
        deterministic arithmetic) before any bytes are produced. The
        engine's decimal values remain authoritative; the workbook is a
        reviewer cross-check, never a source of truth.
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            pattern: "^[a-z][a-z0-9-]{1,39}$"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerificationWorkbookRequest"
      responses:
        "200":
          description: >-
            Base64-encoded macro-free workbook and its provenance. This is
            not a legal conclusion; human review remains required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationWorkbookResponse"
        "400":
          description: >-
            Invalid payload, abstaining calculation, citation mismatch,
            threshold mismatch, or arithmetic mismatch.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "404":
          description: Workspace not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
components:
  schemas:
    Health:
      type: object
      additionalProperties: false
      required: [status, contract_version]
      properties:
        status:
          const: ok
        contract_version:
          const: 1.3.0
    LtvCalculationRequest:
      type: object
      additionalProperties: false
      required: [model_id, scenario_id]
      properties:
        model_id:
          const: ltv-v1
        scenario_id:
          oneOf:
            - type: string
              minLength: 1
              maxLength: 80
            - type: "null"
    LtvCalculation:
      oneOf:
        - $ref: "#/components/schemas/CalculatedLtv"
        - $ref: "#/components/schemas/UnavailableLtv"
    UnavailableLtv:
      type: object
      additionalProperties: false
      required:
        - model_id
        - status
        - missing_information
        - human_review_required
        - sources
      properties:
        model_id:
          type: string
        status:
          const: calculation_unavailable
        missing_information:
          type: array
          minItems: 1
          items:
            type: string
        human_review_required:
          const: true
        sources:
          type: array
          items:
            $ref: "#/components/schemas/Citation"
    CalculatedLtv:
      type: object
      additionalProperties: false
      required:
        - model_id
        - model_version
        - status
        - calculation_purpose
        - evaluation_date
        - test_date
        - currency
        - scenario
        - source_inputs
        - calculation_inputs
        - formula
        - outputs
        - selected_threshold
        - waiver_observation
        - assumptions
        - missing_information
        - human_review_required
        - review_note
        - sources
      properties:
        model_id:
          const: ltv-v1
        model_version:
          type: integer
          minimum: 1
        status:
          const: calculated_human_review_required
        calculation_purpose:
          const: covenant_test
        evaluation_date:
          type: string
          format: date
        test_date:
          type: string
          format: date
        currency:
          type: string
          pattern: "^[A-Z]{3}$"
        scenario:
          type: object
          required: [scenario_id, label, rationale]
          properties:
            scenario_id: { type: string }
            label: { type: string }
            rationale: { type: string }
        source_inputs:
          type: object
        calculation_inputs:
          type: object
        formula:
          type: object
        outputs:
          type: object
        selected_threshold:
          type: object
        waiver_observation:
          oneOf:
            - type: object
            - type: "null"
        assumptions:
          type: array
          items: { type: string }
        missing_information:
          type: array
          maxItems: 0
        human_review_required:
          const: true
        review_note:
          type: string
        sources:
          type: array
          minItems: 4
          items:
            $ref: "#/components/schemas/Citation"
    VerificationWorkbookRequest:
      $ref: "#/components/schemas/CalculatedLtv"
    VerificationWorkbookResponse:
      type: object
      additionalProperties: false
      required: [workbook_base64, provenance]
      properties:
        workbook_base64:
          type: string
          contentEncoding: base64
          description: Macro-free .xlsx bytes, base64-encoded.
        provenance:
          type: object
          additionalProperties: false
          required:
            - engine_version
            - model_id
            - model_version
            - scenario_id
            - generated_at
            - sha256
          properties:
            engine_version:
              type: string
            model_id:
              type: string
            model_version:
              type: integer
              minimum: 1
            scenario_id:
              type: string
            generated_at:
              type: string
              format: date-time
            sha256:
              type: string
              pattern: "^[a-f0-9]{64}$"
    AnswerRequest:
      type: object
      additionalProperties: false
      required: [question, as_of]
      properties:
        question:
          type: string
          minLength: 1
          maxLength: 4000
        as_of:
          type: string
          format: date
        test_date:
          oneOf:
            - type: string
              format: date
            - type: "null"
    Answer:
      type: object
      additionalProperties: false
      required:
        - question
        - as_of_date
        - short_answer
        - support_status
        - sources
        - assumptions
        - missing_information
        - human_review_required
        - review_note
        - notes_on_currentness
        - query_category
      properties:
        question:
          type: string
        as_of_date:
          type: string
          format: date
        short_answer:
          type: string
        support_status:
          enum:
            - supported
            - partially_supported
            - source_not_found
            - legal_review_required
        sources:
          type: array
          items:
            $ref: "#/components/schemas/Citation"
        assumptions:
          type: array
          items:
            type: string
        missing_information:
          type: array
          items:
            type: string
        human_review_required:
          type: boolean
        review_note:
          type: string
        notes_on_currentness:
          type: string
        query_category:
          type: string
    Citation:
      type: object
      additionalProperties: false
      required:
        - document_id
        - document_title
        - document_type
        - locator
        - page
        - passage_id
        - supporting_passage
        - source_path
      properties:
        document_id:
          type: string
        document_title:
          type: string
        document_type:
          type: string
        locator:
          type: string
        page:
          type: integer
          minimum: 1
        passage_id:
          type: string
        supporting_passage:
          type: string
        source_path:
          type: string
    ContractPosition:
      type: object
      additionalProperties: false
      required:
        - as_of_date
        - support_status
        - ltv
        - ltv_modifications
        - ltv_waivers
        - distribution_conditions
        - sources
        - missing_information
      properties:
        as_of_date:
          type: string
          format: date
        support_status:
          enum: [supported, missing_support]
        ltv:
          oneOf:
            - $ref: "#/components/schemas/LtvPosition"
            - type: "null"
        ltv_modifications:
          type: array
          items:
            $ref: "#/components/schemas/LtvModification"
        ltv_waivers:
          type: array
          items:
            $ref: "#/components/schemas/LtvWaiver"
        distribution_conditions:
          type: array
          items:
            $ref: "#/components/schemas/DistributionCondition"
        sources:
          type: array
          items:
            $ref: "#/components/schemas/Citation"
        missing_information:
          type: array
          items:
            type: string
    LtvPosition:
      type: object
      additionalProperties: false
      required:
        - base_threshold
        - base_applies_from
        - base_document_id
        - base_locator
        - current_threshold
        - unit
        - controlling_document_id
        - controlling_locator
        - amendment_active
        - waiver_relevant
        - distribution_condition_active
      properties:
        base_threshold:
          type: number
        base_applies_from:
          type: string
          format: date
        base_document_id:
          type: string
        base_locator:
          type: string
        current_threshold:
          type: number
        unit:
          type: string
        controlling_document_id:
          type: string
        controlling_locator:
          type: string
        amendment_active:
          type: boolean
        waiver_relevant:
          type: boolean
        distribution_condition_active:
          type: boolean
    LtvModification:
      type: object
      additionalProperties: false
      required:
        - document_id
        - locator
        - value
        - unit
        - applies_from
        - applies_to
        - active
      properties:
        document_id:
          type: string
        locator:
          type: string
        value:
          type: number
        unit:
          type: string
        applies_from:
          type: string
          format: date
        applies_to:
          type: string
          format: date
        active:
          type: boolean
    LtvWaiver:
      type: object
      additionalProperties: false
      required:
        - document_id
        - locator
        - test_date
        - relief_above
        - relief_up_to
        - unit
        - does_not_amend
        - relevant
      properties:
        document_id:
          type: string
        locator:
          type: string
        test_date:
          type: string
          format: date
        relief_above:
          type: number
        relief_up_to:
          type: number
        unit:
          type: string
        does_not_amend:
          type: boolean
        relevant:
          type: boolean
    DistributionCondition:
      type: object
      additionalProperties: false
      required:
        - document_id
        - locator
        - prohibition
        - applies_from
        - applies_to
        - active
      properties:
        document_id:
          type: string
        locator:
          type: string
        prohibition:
          type: boolean
        applies_from:
          type: string
          format: date
        applies_to:
          type: string
          format: date
        active:
          type: boolean
    Problem:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: string
